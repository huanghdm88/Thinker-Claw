<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Thinker Pet — 选择角色（手机端）</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32' rx='6'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white'>T</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <span class="app-title">Thinker Pet</span>
    </header>
    <main class="main">
      <div class="card">
        <h2 class="card-title">选择你的伙伴</h2>
        <p class="card-desc">选择后进入对话页，向角色发消息、下达任务或创建定时提醒，角色会随执行状态自动切换动作。本应用为手机端 H5，建议在手机浏览器中打开。</p>
        <div class="character-grid" id="character-grid"></div>
        <div class="confirm-row">
          <button type="button" class="btn btn-primary" id="btn-confirm" disabled>确认并进入对话</button>
        </div>
      </div>
    </main>
  </div>
  <script src="js/storage.js"></script>
  <script src="js/config.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/thinker-pet-bridge.js"></script>
  <script>
    (function () {
      const grid = document.getElementById('character-grid');
      const btnConfirm = document.getElementById('btn-confirm');
      let selectedIndex = getCharacterIndex();
      const baseUrl = (window.ThinkerClawConfig && window.ThinkerClawConfig.petBase) || '../Thinker-pet/index.html';

      function renderGrid() {
        grid.innerHTML = '';
        CHARACTERS.forEach(function (c) {
        const el = document.createElement('div');
        el.className = 'character-item' + (c.index === selectedIndex ? ' selected' : '');
        el.setAttribute('data-index', c.index);
        const embedSrc = baseUrl + '?embed=1&character=' + c.index + '&action=idle&lang=zh';
        el.innerHTML =
          '<div class="character-avatar character-avatar-embed">' +
            '<iframe src="' + embedSrc + '" title="' + c.name + '" loading="lazy"></iframe>' +
          '</div>' +
          '<span class="character-name">' + c.name + '</span>';
        el.addEventListener('click', function () {
          selectedIndex = parseInt(el.getAttribute('data-index'), 10);
          grid.querySelectorAll('.character-item').forEach(function (item) {
            item.classList.toggle('selected', parseInt(item.getAttribute('data-index'), 10) === selectedIndex);
          });
          btnConfirm.disabled = false;
        });
        grid.appendChild(el);
        });
      }

      (window.CHARACTERS_READY || Promise.resolve(CHARACTERS)).then(function () {
        renderGrid();
      });

      btnConfirm.addEventListener('click', function () {
        setCharacterIndex(selectedIndex);
        setChosenCharacter();
        setSessionStartAt(new Date());
        setLastActiveAt(new Date());
        window.location.href = 'chat.html';
      });

      if (location.search.includes('reset=1')) {
        clearChosenCharacter();
      } else if (hasChosenCharacter()) {
        window.location.href = 'chat.html';
      }
    })();
  </script>
</body>
</html>
